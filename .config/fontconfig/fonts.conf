<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <selectfont>
  <rejectfont>
   <pattern>
    <patelt name="family">
     <string>Courier New</string>
    </patelt>
   </pattern>
  </rejectfont>
 </selectfont>
 <alias>
  <family>monospace</family>
  <prefer>
   <family>Cascadia Code</family>
   <family>Noto Sans Mono</family>
   <family>Liberation Mono</family>
  </prefer>
 </alias>
 <dir>~/.fonts</dir>
</fontconfig>
